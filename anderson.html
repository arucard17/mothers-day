<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Mother's Day — Anderson</title>
    <link rel="icon" href="heart.png" sizes="16x16">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="audio-player.css">
</head>

<body>
    <audio id="message" src="audio/anderson.ogg" preload="metadata"></audio>
    <div class="hearts-layer" id="hearts" aria-hidden="true"></div>

    <div class="dark fadeout"></div>
    <div class="sun slidein"></div>
    <h1 class="fadein">Happy Mother's Day</h1>
    <h2 class="fadin delay-1">Love you, mom 🥰 — Anderson</h2>

    <div class="audio-center">
        <button type="button" id="playBtn" class="play-btn" aria-label="Play message">
            <span class="play-btn__icon" aria-hidden="true">▶</span>
            <span class="play-btn__label">Play</span>
        </button>
    </div>

    <section class="flowers">
        <div class="flower">
            <div class="flower_head pulse"></div>
            <div class="flower_stem grow-12"></div>
        </div>
        <div class="flower">
            <div class="flower_head pulse pink"></div>
            <div class="flower_stem grow-15"></div>
        </div>
        <div class="flower">
            <div class="flower_head pulse yellow"></div>
            <div class="flower_stem grow-9"></div>
        </div>
    </section>

    <script src="audio-player.js"></script>
</body>

</html>
